name: Dump on Demand

on:
  workflow_dispatch:
    inputs:
      process_name:
        description: "Process to dump (e.g. DumpPoc.Target)"
        required: true
        default: "DumpPoc.Target"
      runtime:
        description: "Runtime"
        required: true
        default: dotnet-modern
        type: choice
        options:
          - dotnet-modern
          - dotnet-framework
          - native
      requester_email:
        description: "Requester email"
        required: true
      requester_name:
        description: "Requester name"
        required: true

jobs:
  dump:
    name: Take dump (${{ inputs.process_name }})
    runs-on: [self-hosted, aspire-poc-runner]
    environment: dump-production  # required-reviewer approval gate

    steps:
      - name: Request dump from agent
        id: result
        shell: pwsh
        run: |
          $requestId = "${{ github.run_id }}-${{ github.run_attempt }}"

          $body = @{
            requestId      = $requestId
            processName    = "${{ inputs.process_name }}"
            runtime        = "${{ inputs.runtime }}"
            requesterEmail = "${{ inputs.requester_email }}"
            requesterName  = "${{ inputs.requester_name }}"
          } | ConvertTo-Json -Compress

          $r = Invoke-RestMethod `
            -Uri "http://host.docker.internal:5100/dump" `
            -Method POST `
            -ContentType "application/json; charset=utf-8" `
            -Headers @{ "X-Dump-Secret" = "${{ secrets.DUMP_AGENT_SECRET }}" } `
            -Body $body

          "success=$($r.success)"  | Out-File $env:GITHUB_OUTPUT -Append

          if ($r.fullDumpPath) {
            "full_dump=$(Split-Path $r.fullDumpPath -Leaf)"    | Out-File $env:GITHUB_OUTPUT -Append
          }
          if ($r.managedDumpPath) {
            "managed_dump=$(Split-Path $r.managedDumpPath -Leaf)" | Out-File $env:GITHUB_OUTPUT -Append
          }

          # previewHtml is markdown — GitHub renders it natively in the job summary.
          if ($r.previewHtml) {
            $r.previewHtml | Out-File $env:GITHUB_STEP_SUMMARY -Encoding utf8 -Append
          }

          if (-not $r.success) {
            Write-Error "Dump failed: $($r.error)"
            exit 1
          }

      - name: Upload full dump (procdump)
        if: steps.result.outputs.full_dump != ''
        uses: actions/upload-artifact@v4
        with:
          name: full-dump-${{ github.run_id }}
          path: /dumps/${{ steps.result.outputs.full_dump }}
          retention-days: 14

      - name: Upload managed dump (dotnet-dump)
        if: steps.result.outputs.managed_dump != ''
        uses: actions/upload-artifact@v4
        with:
          name: managed-dump-${{ github.run_id }}
          path: /dumps/${{ steps.result.outputs.managed_dump }}
          retention-days: 14
